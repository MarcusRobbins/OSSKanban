<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OSSKanban demo</title>
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react/": "https://esm.sh/react@18.3.1/",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client"
    }
  }
  </script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 40rem; }
    #boot-status {
      font-family: ui-monospace, monospace;
      font-size: 0.8125rem;
      color: #666;
      padding: 0.5rem 0.75rem;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      margin-bottom: 1rem;
      background: #fafafa;
    }
    #boot-status.error { color: #a00; background: #fff0f0; border-color: #f0c0c0; }
    input { font: inherit; padding: 0.25rem 0.5rem; }
    button { font: inherit; padding: 0.25rem 0.75rem; cursor: pointer; }
    code { background: #f0f0f0; padding: 0.1em 0.3em; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="boot-status">Booting…</div>
  <div id="root"></div>
  <script>(function(){var cb=new URL(location.href).searchParams.get("t")||Date.now().toString(36);var s=document.createElement("script");s.type="module";s.src="./bootstrap.js?_cb="+cb;document.body.appendChild(s);})();</script>

  <!-- Chorus loader. Resolves the latest commit on the chorus `main` branch,
       then loads the unified panel via jsDelivr's commit-SHA URL form — that
       form is immutable (cached forever), so we always get fresh code. -->
  <script>
    (async function () {
      try {
        var apiRes = await fetch('https://api.github.com/repos/MarcusRobbins/chorus/commits/main', {
          headers: { 'Accept': 'application/vnd.github+json' },
        });
        var sha = (await apiRes.json()).sha;
        var BASE = 'https://cdn.jsdelivr.net/gh/MarcusRobbins/chorus@' + sha;
        var s = document.createElement('script');
        s.type = 'module';
        s.id = 'chorus';
        s.src = BASE + '/packages/chorus/app.js';
        s.setAttribute('data-github-client-id', 'Ov23lijbc9rZ5Vi9o9F2');
        s.setAttribute('data-github-repo', 'MarcusRobbins/OSSKanban');
        s.setAttribute('data-github-auth-proxy', 'https://chorus-auth-proxy.marcusrobbins58.workers.dev');
        s.setAttribute('data-openai-model', 'gpt-4o');
        s.setAttribute('data-debug', 'true');
        document.body.appendChild(s);
      } catch (err) {
        console.error('[chorus-loader] failed to resolve latest commit:', err);
      }
    })();
  </script>
</body>
</html>
