<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OSSKanban demo</title>
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react/": "https://esm.sh/react@18.3.1/",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client"
    }
  }
  </script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 40rem; }
    #boot-status {
      font-family: ui-monospace, monospace;
      font-size: 0.8125rem;
      color: #666;
      padding: 0.5rem 0.75rem;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      margin-bottom: 1rem;
      background: #fafafa;
    }
    #boot-status.error { color: #a00; background: #fff0f0; border-color: #f0c0c0; }
    input { font: inherit; padding: 0.25rem 0.5rem; }
    button { font: inherit; padding: 0.25rem 0.75rem; cursor: pointer; }
    code { background: #f0f0f0; padding: 0.1em 0.3em; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="boot-status">Booting…</div>
  <div id="root"></div>
  <script type="module" src="./bootstrap.js"></script>

  <!-- Chorus loader. Resolves the latest commit on the chorus `main` branch,
       then loads widget + switcher via jsDelivr's commit-SHA URL form — that
       form is immutable (cached forever under a unique key), so we always get
       the freshly-pushed code and never hit edge-cache staleness. -->
  <script>
    (async function () {
      try {
        var apiRes = await fetch('https://api.github.com/repos/MarcusRobbins/chorus/commits/main', {
          headers: { 'Accept': 'application/vnd.github+json' },
        });
        var sha = (await apiRes.json()).sha;
        var BASE = 'https://cdn.jsdelivr.net/gh/MarcusRobbins/chorus@' + sha;
        var scripts = [
          {
            src: '/packages/widget/widget.js',
            id: 'oss-kanban-widget',
            data: {
              'github-client-id': 'Ov23lijbc9rZ5Vi9o9F2',
              'github-repo': 'MarcusRobbins/OSSKanban',
              'github-auth-proxy': 'https://chorus-auth-proxy.marcusrobbins58.workers.dev',
              'openai-model': 'gpt-4o',
              'debug': 'true',
            },
          },
          {
            src: '/packages/switcher/switcher.js',
            id: 'oss-kanban-switcher',
            data: {
              'github-repo': 'MarcusRobbins/OSSKanban',
              'debug': 'true',
            },
          },
        ];
        scripts.forEach(function (cfg) {
          var s = document.createElement('script');
          s.type = 'module';
          s.id = cfg.id;
          s.src = BASE + cfg.src;
          Object.keys(cfg.data).forEach(function (k) {
            s.setAttribute('data-' + k, cfg.data[k]);
          });
          document.body.appendChild(s);
        });
      } catch (err) {
        console.error('[chorus-loader] failed to resolve latest commit:', err);
      }
    })();
  </script>
</body>
</html>
